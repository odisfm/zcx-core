__tonic_select:
  includes: [
    state_2, state_3, state_4, state_5, state_6, state_7,
    select_7, select_6, select_5, select_4, select_3, select_2
  ]
  props:
    tonics: [
      C, G, D, A, E, B, F#, C#, G#, D#, A#, F  # SCL action only works with sharps
    ]
  type: keyboard
  function:
    scale:
      root: ${me.props.tonics[me.index]}
  gestures:
    press: SCL ROOT ${me.props.tonics[me.index]}
    release:
      log: ${me.index}
  active_color:
    pulse: white
  inactive_color: purple

select_8:
  type: keyboard
  function: in_key
  gestures:
    press: >
      ZCX ${this_cs} KB INKEY

select_1:
  color: 0

state_1:
  color: 0

state_8:
  color: 0
