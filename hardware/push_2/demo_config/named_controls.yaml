__dpad:
  includes: [dpad_left, dpad_right, dpad_up, dpad_down]
  color: 127
  repeat: true
  controls:
    dpad_left:
      gestures:
        press: LEFT
        press__shift:
          ring:
            x: -1
    dpad_right:
      gestures:
        press: RIGHT
        press__shift:
          ring:
            x: 1
    dpad_up:
      gestures:
        press: UP
        press__shift:
          ring:
            y: -1
    dpad_down:
      gestures:
        press: DOWN
        press__shift:
          ring:
            y: 1

