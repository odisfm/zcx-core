setup:
  gestures:
    long_press:
      hot_reload: true

device:
  type: mode
  mode: device
  active_color: 127
  inactive_color: 20
  gestures:
    press:
      mode_on: device

mix:
  type: mode
  mode: mix
  active_color: 127
  inactive_color: 20
  gestures:
    press:
      mode_on: mix

browse:
  type: mode
  mode: browse
  active_color: 127
  inactive_color: 20
  gestures:
    press:
      mode_on: browse

clip:
  type: mode
  mode: clip
  active_color: 127
  inactive_color: 20
  gestures:
    press:
      mode_on: clip

add_device:
  type: mode
  mode: add_device
  active_color: 127
  inactive_color: 20
  gestures:
    press:
      mode_on: add_device

add_track:
  type: mode
  mode: add_track
  active_color: 127
  inactive_color: 20
  gestures:
    press:
      mode_on: add_track

master:
  type: param
  binding: MST / SEL
  on_color: 127
  off_color: 20

__scene_group:
  includes: [scene_1, scene_2, scene_3, scene_4, scene_5, scene_6, scene_7, scene_8]
  color: cyan
  gestures:
    press: SCENE ${ring.scenes[me.Index]}
    press__shift: SCENE ${ring.scenes[me.Index + me.group_count]}
    press__select: SCENE SEL ${ring.scenes[me.Index]}
    press__shift__select: SCENE SEL ${ring.scenes[me.Index + me.group_count]}

