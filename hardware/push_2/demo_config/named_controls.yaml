select:
  type: mode
  mode: select
  active_color: 127
  inactive_color: 40
  gestures:
    press:
      mode_on: select
    release:
      mode_off: select

shift:
  type: mode
  mode: shift
  active_color: 127
  inactive_color: 40
  gestures:
    press:
      mode_on: shift
    release:
      mode_off: shift

play:
  type: transport
  transport: play
  gestures:
    press: SETPLAY

record:
  type: transport
  transport: record
  gestures:
    short_press: SREC
    long_press: SRECFIX %zcx_fixed_record%

__state_row:
  # the top row
  includes: [state_1, state_2, state_3, state_4, state_5, state_6, state_7, state_8]
  type: page
  page: ${me.index}
  active_color: white
  inactive_color:
    palette: rainbow
  gestures:
    press:
      page: ${me.index}
      msg: >
        Page ${me.page}: ${me.page_name}
    long_release:
      page: last

