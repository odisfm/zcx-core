duplicate:
  gestures:
    press: SCENE DUPE

new:
  gestures:
    press: ADDSCENE

fixed_length:
  color: 20
  gestures:
    press:
      pseq:
        -
          cxp: >
            %zcx_fixed_record% = 8
          color: 127
        -
          cxp: >
            %zcx_fixed_record% = 0
          color: 20

automate:
  type: transport
  transport: automation
  inactive_color: white
  active_color: red
  gestures:
    press: SATM

record:
  type: transport
  transport: record
  gestures:
    short_press: SREC
    long_press: SRECFIX %zcx_fixed_record%

play:
  type: transport
  transport: play
  gestures:
    press: SETPLAY

