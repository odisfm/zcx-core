#     long_press: DUMMY

note:
  type: page
  page: keyboard_page
  gestures:
    press:
      page: keyboard_page
    long_release:
      page: last

session:
  type: page
  page: session_view_page
  gestures:
    press:
      page: session_view_page
    long_release:
      page: last

page_prev:
  repeat: true
  gestures:
    press:
      log: ${ring.width} - ${type(ring.width)}
      ring:
        x: -${ring.width}
    press__shift:
      ring: left

page_next:
  repeat: true
  gestures:
    press:
      ring:
        x: ${ring.width}
    press__shift:
      ring: right

octave_up:
  repeat: true
  gestures:
    press:
      ring:
        y: -${ring.height}
    press__shift:
      ring: up

octave_down:
  repeat: true
  gestures:
    press:
      ring:
        y: ${ring.height}
    press__shift:
      ring: down

select:
  type: mode
  mode: select
  active_color: 127
  inactive_color: 40
  gestures:
    press:
      mode_on: select
    release:
      mode_off: select

shift:
  type: mode
  mode: shift
  active_color: 127
  inactive_color: 40
  gestures:
    press:
      mode_on: shift
    release:
      mode_off: shift


