###
### left side
###

tap_tempo:
  gestures:
    press: TAPBPM

metronome:
  type: transport
  transport: metronome
  gestures:
    press: metro

delete:
  type: mode
  mode: delete
  gestures:
    press:
      mode_on: delete
    release:
      mode_off: delete

undo:
  gestures:
    press: UNDO
    press__shift: REDO

mute:
  type: param
  binding: SEL / MUTE
  on_color: amber
  off_color: white

solo:
  type: param
  binding: SEL / SOLO
  on_color: blue
  off_color: white

stop_clip:
  type: param
  binding: SEL / STOP
  on_color: white
  off_color: grey

