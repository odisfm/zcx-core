page_prev:
  repeat: true
  gestures:
    press:
      ring:
        x: -8
    press__shift:
      ring: left

page_next:
  repeat: true
  gestures:
    press:
      ring:
        x: 8
    press__shift:
      ring: right

octave_up:
  repeat: true
  gestures:
    press:
      ring:
        y: -6
    press__shift:
      ring: up

octave_down:
  repeat: true
  gestures:
    press:
      ring:
        y: 6
    press__shift:
      ring: down

metronome:
  type: transport
  transport: metronome
  gestures:
    press: metro

delete:
  type: mode
  mode: delete
  gestures:
    press:
      mode_on: delete
    released:
      mode_off: delete

undo:
  gestures:
    press: undo
    press__shift: redo

mute:
  type: param
  binding: SEL / MUTE
  on_color: amber
  off_color: white

solo:
  type: param
  binding: SEL / SOLO
  on_color: blue
  off_color: white

stop_clip:
  type: param
  binding: SEL / STOP
  on_color: white
  off_color: grey

new:
  gestures:
    press: ADDSCENE

fixed_length:
  color: 20
  gestures:
    press:
      pseq:
        -
          cxp: >
            %zcx_fixed_record% = 8
          color: 127
        -
          cxp: >
            %zcx_fixed_record% = 0
          color: 20

automate:
  type: transport
  transport: automation
  inactive_color: white
  active_color: red
  gestures:
    press: SATM

duplicate:
  gestures:
    press: SCENE DUPE

master:
  type: param
  binding: MST / SEL
  on_color: 127
  off_color: 20

user:
  gestures:
    press:
      hardware_mode: live

tap_tempo:
  gestures:
    press: TAPBPM

note:
  type: page
  page: keyboard_page
  gestures:
    press:
      page: keyboard_page
    long_release:
      page: last

session:
  type: page
  page: session_view_page
  gestures:
    press:
      page: session_view_page
