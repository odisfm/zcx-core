__encoder_row:
  includes: [
    enc_1, enc_2, enc_3, enc_4, enc_5, enc_6, enc_7, enc_8
  ]
  binding:
    default: NONE
    __mix: >
      RING(${me.index}) / VOL
    __shift: >
      RING(${me.index}) / PAN
    __device: >
      SEL / DEV(SEL) B1 P${me.Index}
    __shift__device: >
      SEL / DEV(SEL) B2 P${me.Index}
    __browse: >
      SEL / SEND ${send_num(me.index)}
  encoders:
    enc_1:
      binding:
        __clip: SEL / VOL
        __add_device: >
          NONE
        __add_track: >
          NONE
    enc_2:
      binding:
        __clip: SEL / PAN
        __add_device: >
          NONE
        __add_track: >
          NONE
    enc_3:
      binding:
        __clip: SEL / SEND A
        __add_device: >
          NONE
        __add_track: >
          NONE
    enc_4:
      binding:
        __clip: SEL / SEND B
        __add_device: >
          NONE
        __add_track: >
          NONE
    enc_5:
      binding:
        __clip: SEL / DEV(SEL) B1 P1
        __add_device: >
          NONE
        __add_track: >
          NONE
    enc_6:
      binding:
        __clip: SEL / DEV(SEL) B1 P2
        __add_device: >
          NONE
        __add_track: >
          NONE
    enc_7:
      binding:
        __clip: SEL / DEV(SEL) B1 P3
        __add_device: >
          NONE
        __add_track: >
          NONE
    enc_8:
      binding:
        __clip: SEL / DEV(SEL) B1 P4
        __add_device: >
          NONE
        __add_track: >
          NONE

enc_master:
  binding:
    default: MST / VOL
    __shift: MST / CUE

tempo:
  binding: SEL / PAN

swing:
  binding: SEL / VOL
