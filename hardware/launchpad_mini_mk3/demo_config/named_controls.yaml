  type: transport
  transport: play
  active_color: grey
  inactive_color: dark_grey


###
### right side
###

__scene_controls:
  includes:
    [scene_1, scene_2, scene_3, scene_4]
  color:
    palette: coral
  gestures:
    press: >
      SCENE ${ring.scenes[me.Index]}
    press__shift: >
      SCENE ${ring.scenes[me.Index + me.group_count]}
    press__select: >
      SCENE SEL ${ring.scenes[me.Index]}
    press__shift__select: >
      SCENE SEL ${ring.scenes[me.Index + me.group_count]}

