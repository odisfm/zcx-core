###
### top row
###

nav_up:
  repeat: true
  color: purple
  gestures:
    press:
      ring:
        y: -${ring.height}
    press__shift:
      ring:
        y: -1

nav_down:
  repeat: true
  color: purple
  gestures:
    press:
      ring:
        y: ${ring.height}
    press__shift:
      ring:
        y: 1

nav_left:
  repeat: true
  color: sky shade 2
  gestures:
    press:
      ring:
        x: -${ring.width}
    press__shift:
      ring:
        x: -1

nav_right:
  repeat: true
  color: sky shade 2
  gestures:
    press:
      ring:
        x: ${ring.width}
    press__shift:
      ring:
        x: 1

session:
  color: 1
  hold_color: red
  gestures:
    press:
      refresh: true
    short_press:
      msg: hold to return to Live mode
    long_press:
      hardware_mode: live
    double_click:
      msg: double click with shift to do a hot reload
    double_click__shift:
      hot_reload: true

__page_controls:
  includes:
    [drums, keys, user]
  type: page
  page: ${me.index}
  gestures:
    press:
      page: ${me.index}
      msg: >
        Page: ${me.page_name}
    long_release:
      page: last
  active_color:
    pulse: white
  inactive_color:
    palette: coral_reverse

