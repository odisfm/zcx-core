__encoder_row:
  includes: [
    enc_1, enc_2, enc_3, enc_4, enc_5, enc_6, enc_7, enc_8
  ]
  binding:
    default: NONE
    __volume: >
      RING(${me.index}) / VOL
    __shift: >
      RING(${me.index}) / PAN
    __device: >
      SEL / DEV(SEL) B1 P${me.Index}
    __device__shift: >
      SEL / DEV(SEL) B2 P${me.Index}
    __sends: >
      SEL / SEND ${send_num(me.index)}

  encoders:
    enc_1:
      binding:
        __track: >
            SEL / VOL
        __browse: NONE
        __clip: NONE
    enc_2:
      binding:
        __track: >
          SEL / PAN
        __browse: NONE
        __clip: NONE
    enc_3:
      binding:
        __track: >
          SEL / SEND A
        __browse: NONE
        __clip: NONE
    enc_4:
      binding:
        __track: >
          SEL / SEND B
        __browse: NONE
        __clip: NONE
    enc_5:
      binding:
        __track: >
          SEL / DEV(SEL) B1 P1
        __browse: NONE
        __clip: NONE
    enc_6:
      binding:
        __track: >
          SEL / DEV(SEL) B1 P2
        __browse: NONE
        __clip: NONE
    enc_7:
      binding:
        __track: >
          SEL / DEV(SEL) B1 P3
        __browse: NONE
        __clip: NONE
    enc_8:
      binding:
        __track: >
          SEL / DEV(SEL) B1 P4
        __browse: NONE
        __clip: NONE

enc_master:
  binding:
    default: MST / VOL
    __shift: MST / CUE

tempo:
  binding: SEL / PAN

swing:
  binding: SEL / VOL
