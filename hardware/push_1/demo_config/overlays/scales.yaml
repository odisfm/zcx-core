__tonic_select:
  includes: [
    select_2, select_3, select_4, select_5, select_6, select_7,
    state_7, state_6, state_5, state_4, state_3, state_2
  ]
  props:
    tonics: [
      C, G, D, A, E, B, F#, C#, G#, D#, A#, F  # SCL action only works with sharps
    ]
  type: keyboard
  function:
    scale:
      root: ${me.props.tonics[me.index]}
  gestures:
    press: SCL ROOT ${me.props.tonics[me.index]}
  active_color: yellow
  inactive_color: ${"red_half" if me.index < 6 else "red shade 2"}

select_8:
  type: keyboard
  function: in_key
  active_color: green
  inactive_color: amber
  gestures:
    press: >
      ZCX ${this_cs} KB INKEY

select_1:
  color: 0

state_1:
  color: 0

state_8:
  color: 0
