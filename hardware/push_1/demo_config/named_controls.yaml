### right side
###

master:
  type: param
  binding: MST / SEL
  on_color: full
  off_color: half

stop:
  type: param
  binding: SEL / STOP

__scene_group:
  includes: [scene_1, scene_2, scene_3, scene_4, scene_5, scene_6, scene_7, scene_8]
  gestures:
    press: SCENE ${ring.scenes[me.Index]}
    press__shift: SCENE ${ring.scenes[me.Index + me.group_count]}
    press__select: SCENE SEL ${ring.scenes[me.Index]}
    press__shift__select: SCENE SEL ${ring.scenes[me.Index + me.group_count]}
  controls:
    scene_1:
      color: red
    scene_2:
      color: red
    scene_3:
      color: amber
    scene_4:
      color: amber
    scene_5:
      color: yellow
    scene_6:
      color: yellow
    scene_7:
      color: green
    scene_8:
      color: green

