volume:
  type: mode
  mode: volume
  gestures:
    press:
      mode_on: volume

track:
  type: mode
  mode: track
  gestures:
    press:
      mode_on: track

device:
  type: mode
  mode: device
  gestures:
    press:
      mode_on: device

pan_send:
  type: mode
  mode: sends
  gestures:
    press:
      mode_on: sends

browse:
  type: mode
  mode: browse
  gestures:
    press:
      mode_on: browse

clip:
  type: mode
  mode: clip
  gestures:
    press:
      mode_on: clip

in:
  repeat: true
  gestures:
    press:
      ring:
        x: -${ring.width}
    press__device: DEVLEFT
    long_press__device: DEVFIRST

out:
  repeat: true
  gestures:
    press:
      ring:
        x: ${ring.width}
    press__device: DEVRIGHT
    long_press__device: DEVLAST


mute:
  type: param
  binding: SEL / MUTE

solo:
  type: param
  binding: SEL / SOLO

scales:
  type: overlay
  overlay: scales
  active_color: full
  inactive_color: half
  gestures:
    press:
      overlay:
        toggle: scales

