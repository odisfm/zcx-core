note:
  type: page
  page: keyboard_page
  gestures:
    press:
      page: keyboard_page
    long_release:
      page: last

session:
  type: page
  page: session_view_page
  gestures:
    press:
      page: session_view_page
    long_release:
      page: last

__dpad:
  includes: [dpad_left, dpad_right, dpad_up, dpad_down]
  repeat: true
  controls:
    dpad_left:
      gestures:
        press: LEFT
        press__shift:
          ring:
            x: -1
    dpad_right:
      gestures:
        press: RIGHT
        press__shift:
          ring:
            x: 1
    dpad_up:
      gestures:
        press: UP
        press__shift:
          ring:
            y: -1
    dpad_down:
      gestures:
        press: DOWN
        press__shift:
          ring:
            y: 1

