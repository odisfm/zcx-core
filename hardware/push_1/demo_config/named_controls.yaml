metronome:
  type: transport
  transport: metronome
  gestures:
    press: METRO

undo:
  gestures:
    press: UNDO
    press__shift: REDO

delete:
  type: mode
  mode: delete
  gestures:
    press:
      mode_on: delete
    release:
      mode_off: delete

# double:
#   gestures:
#     short_press: DUMMY
#     long_press: DUMMY

# quantize:
#   gestures:
#     short_press: DUMMY
#     long_press: DUMMY

fixed_length:
  color: full
  gestures:
    press:
      pseq:
        -
          cxp: >
            %zcx_fixed_record% = 8
          color: full
        -
          cxp: >
            %zcx_fixed_record% = 0
          color: half

automation:
  type: transport
  transport: automation
  gestures:
    press: SATM

duplicate:
  gestures:
    press: SCENE DUPE

new:
  gestures:
    press: ADDSCENE

record:
  type: transport
  transport: record
  gestures:
    short_press: SREC
    long_press: SRECFIX %zcx_fixed_record%

play:
  type: transport
  transport: play
  gestures:
    press: SETPLAY

