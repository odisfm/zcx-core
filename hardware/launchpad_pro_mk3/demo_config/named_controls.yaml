arm:
  type: param
  binding: >
    SEL / ARM
  toggle_param: false
  on_color: red
  off_color: white
  gestures:
    press:
      do_toggle: true
    press__shift: UNDO

mute:
  type: param
  binding: >
    SEL / MUTE
  toggle_param: false
  on_color: orange
  off_color: white
  gestures:
    press:
      do_toggle: true
    press__shift: REDO

solo:
  type: param
  binding: >
    SEL / SOLO
  toggle_param: false
  on_color: blue
  off_color: white
  gestures:
    press:
      do_toggle: true
    press__shift: METRO

