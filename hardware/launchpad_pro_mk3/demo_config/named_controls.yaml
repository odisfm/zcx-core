__track_row:
  # the bottom row
  includes: [track_1, track_2, track_3, track_4, track_5, track_6, track_7, track_8]
  type: ring_track
  ring_index: ${me.index}
  gestures:
    press: >
      "${me.track}" / SEL
    long_press: >
      ALL / ARM OFF ;
      "${me.track}" / ARM
    long_press__shift: >
      "${me.track}" / ARM
    double_click: >
      "${me.track}" / PLAY >

