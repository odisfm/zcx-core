stop:
  type: param
  binding: >
    SEL / STOP
  toggle_param: false
  active_color: white
  inactive_color: grey
  gestures:
    press: STOP
    press__shift: STOP NQ


###
### left side
###


clear:
  gestures:
    press:
      msg: Press with shift to delete clip
    press__shift: CLIP DEL

duplicate:
  gestures:
    press: CLIP DUPE
    press__shift: SCENE DUPE

quantize:
  gestures:
    press: CLIP QNTZ 1/16 100

fixed_length:
  color: grey
  gestures:
    press:
      pseq:
        -
          cxp: >
            %zcx_fixed_record% = 8
          color: white
        -
          cxp: >
            %zcx_fixed_record% = 0
          color: grey

play:
  type: transport
  transport: play
  gestures:
    press: SETPLAY

record:
  type: transport
  transport: session_record
  gestures:
    press: RECFIX
    press__shift: SRECFIX 8
