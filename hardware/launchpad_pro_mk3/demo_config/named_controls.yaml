__page_switcher:
  includes: [
    session, note, chord, custom, sequencer, projects
  ]
  type: page
  page: ${me.index}
  active_color:
    palette: rainbow
  inactive_color: white
  gestures:
    press:
      page: ${me.index}
      msg: >
        Page ${me.page}: ${me.page_name}
    long_release:
      page: last
  controls:
    note:
      gestures:
        long_press:
          overlay:
            enable: keyboard_notes
        short_press:
          overlay:
            disable: keyboard_notes

