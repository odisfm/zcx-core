nav_up:
  gestures:
    press: UP
    press__shift:
      ring:
        y: -8

nav_down:
  gestures:
    press: DOWN
    press__shift:
      ring:
        y: 8

nav_left:
  gestures:
    press: LEFT
    press__shift:
      ring:
        x: -8

nav_right:
  gestures:
    press: RIGHT
    press__shift:
      ring:
        x: 8

novation:
  type: transport
  transport: play

shift:
  gestures:
    press:
      mode_on: shift
    release:
      mode_off: shift

play:
  type: transport
  transport: play
  gestures:
    press: SETPLAY

record:
  type: transport
  transport: session_record
  gestures:
    press: SRECFIX 8
    press__shift: SRECFIX 16

duplicate:
  gestures:
    press: CLIP DUPE
    press__shift: SCENE DUPE

clear:
  gestures:
    press:
      msg: Press with shift to delete clip
    press__shift: CLIP DEL

quantize:
  gestures:
    press: CLIP QNTZ 1/16 100

fixed_length:
  color: grey
  gestures:
    press:
      pseq:
        -
          cxp: >
            %zcx_fixed_record% = 8
          color: white
        -
          cxp: >
            %zcx_fixed_record% = 0
          color: grey

arm:
  type: param
  binding: >
    SEL / ARM
  toggle_param: false
  on_color: red
  off_color: white
  gestures:
    press:
      do_toggle: true
    press__shift: UNDO

mute:
  type: param
  binding: >
    SEL / MUTE
  toggle_param: false
  on_color: orange
  off_color: white
  gestures:
    press:
      do_toggle: true
    press__shift: REDO

solo:
  type: param
  binding: >
    SEL / SOLO
  toggle_param: false
  on_color: blue
  off_color: white
  gestures:
    press:
      do_toggle: true
    press__shift: METRO

