###
### nav
###


nav_up:
  gestures:
    press: UP
    press__shift:
      ring:
        y: -${ring.height}

nav_down:
  gestures:
    press: DOWN
    press__shift:
      ring:
        y: ${ring.height}

nav_left:
  gestures:
    press: LEFT
    press__shift:
      ring:
        x: -${ring.width}

nav_right:
  gestures:
    press: RIGHT
    press__shift:
      ring:
        x: ${ring.width}

shift:
  gestures:
    press:
      mode_on: shift
    release:
      mode_off: shift


###
### top row
###

__page_switcher:
  includes: [
    chord, custom, session, note, sequencer, projects
  ]
  type: page
  page: ${me.index}
  active_color:
    palette: rainbow
  inactive_color: white
  gestures:
    press:
      page: ${me.index}
      msg: >
        Page ${me.page}: ${me.page_name}
    long_release:
      page: last
  controls:
    note:
      gestures:
        long_press:
          overlay:
            enable: keyboard_notes
        short_press:
          overlay:
            disable: keyboard_notes

