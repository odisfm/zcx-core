fb_9:
  type: param
  binding: SEL / ARM
  off_color: white
  on_color: red

pad_bank_up:
  gestures:
    press:
      page: prev
    press__shift:
      ring: up 1

pad_bank_down:
  gestures:
    press:
      page: next
    press__shift:
      ring: down 1

scene_launch:
  gestures:
    press: >
      SCENE ${ring.scenes[1]}

function:
  type: mode
  mode: shift
  active_color: purple
  inactive_color: white
  gestures:
    press:
      mode_on: shift
    release:
      mode_off: shift

play:
  type: transport
  transport: play
  gestures:
    press: SETPLAY

stop:
  type: param
  binding: SEL / STOP

loop:
  type: transport
  transport: loop
  gestures:
    press: LOOP

record:
  type: transport
  transport: record
  gestures:
    press: SREC

metronome:
  type: transport
  transport: metronome
  gestures:
    press: METRO

capture:
  gestures:
    press: CAP

quantize:
  gestures:
    short_press:
      CLIP QNTZ 1/16 50
    long_press:
      CLIP QNTZ 1/16 100

undo:
  gestures:
    press: UNDO
    press__shift: REDO

# only on 49/61 key versions

enc_bank_up:
  type: mode
  mode: eb_1
  gestures:
    press:
      mode_on: eb_1

enc_bank_down:
  type: mode
  mode: eb_2
  gestures:
    press:
      mode_on: eb_2

track_left:
  repeat: true
  gestures:
    press: LEFT
    press__shift: DEVLEFT
    long_press__shift: DEVFIRST

track_right:
  repeat: true
  gestures:
    press: RIGHT
    press__shift: DEVRIGHT
    long_press__shift: DEVLAST

# only on 25/37 key versions

enc_bank_up_m:
  type: mode
  mode: eb_1
  gestures:
    press:
      mode_on: eb_1

enc_bank_down_m:
  type: mode
  mode: eb_2
  gestures:
    press:
      mode_on: eb_2
