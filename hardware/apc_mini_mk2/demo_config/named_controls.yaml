shift:
  gestures:
    press:
      mode_on: shift
    release:
      mode_off: shift

__page_group:
  includes: [
    volume, pan, send, device
  ]
  type: page
  page: ${me.index}
  active_color: 127
  inactive_color: 0
  gestures:
    press:
      page: ${me.index}

