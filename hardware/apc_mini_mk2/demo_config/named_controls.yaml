up:
  gestures:
    press: up
    press__shift:
      ring: up

down:
  gestures:
    press: down
    press__shift:
      ring: down

left:
  gestures:
    press: left
    press__shift:
      ring: left

right:
  gestures:
    press: right
    press__shift:
      ring: right

scene_1: # clip stop
  gestures:
    press: SEL / STOP
    press__shift: SCENE ${ring.scenes[0]}

scene_2: # solo
  gestures:
    press: SEL / SOLO
    press__shift: SCENE ${ring.scenes[1]}

scene_3: # mute
  gestures:
    press: SEL / MUTE
    press__shift: SCENE ${ring.scenes[2]}

scene_4: # rec arm
  gestures:
    press: SEL / ARM
    press__shift: SCENE ${ring.scenes[3]}

scene_5: # select
  gestures:
    press:
      mode_on: select
    release:
      mode_off: select
    press__shift: SCENE ${ring.scenes[4]}

scene_6: # drum
  gestures:
    press: SHOWCLIP
    press__shift: SCENE ${ring.scenes[5]}

scene_7: # note
  gestures:
    press: SHOWDETAIL
    press__shift: SCENE ${ring.scenes[6]}

scene_8: # stop all clips
  gestures:
    press: STOPALL
    long_press: STOPALL NQ
    press__shift: SCENE ${ring.scenes[7]}
