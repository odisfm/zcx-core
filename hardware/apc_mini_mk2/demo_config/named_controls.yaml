shift:
  gestures:
    press:
      mode_on: shift
      overlay:
        enable: shift_overlay
    release:
      mode_off: shift
      overlay:
        disable: shift_overlay

__page_group:
  includes: [
    volume, pan, send, device, up, down, left, right
  ]
  type: page
  page: ${me.index}
  active_color: 127
  inactive_color: 0
  gestures:
    press:
      page: ${me.index}
  controls:
    device:
      gestures:
        long_press:
          overlay:
            enable: keyboard_notes
        short_press:
          overlay:
            disable: keyboard_notes

