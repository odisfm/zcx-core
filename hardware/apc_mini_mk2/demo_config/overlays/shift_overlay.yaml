volume:
  type: mode
  mode: volume
  gestures:
    press:
      mode_on: volume

pan:
  type: mode
  mode: pan
  gestures:
    press:
      mode_on: pan

send:
  type: mode
  mode: send
  gestures:
    press:
      mode_on: send

device:
  type: mode
  mode: device
  gestures:
    press:
      mode_on: device

up:
  gestures:
    press:
      ring:
        y: -6

down:
  gestures:
    press:
      ring:
        y: 6

left:
  gestures:
    press:
      ring:
        x: -8

right:
  gestures:
    press:
      ring:
        x: 8

scene_1:
  type: param
  on_color: 127
  off_color: 0
  binding: >
    SEL / STOP

scene_2:
  type: param
  on_color: 127
  off_color: 0
  binding: >
    SEL / SOLO

scene_3:
  type: param
  on_color: 127
  off_color: 0
  binding: >
    SEL / MUTE

scene_4:
  type: param
  on_color: 0
  off_color: 0
  binding: >
    SEL / ARM
    
scene_5:
  color: 0
  gestures:
    press: DUMMY

