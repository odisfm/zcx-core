__fader_row:
  includes:
    - fader_1
    - fader_2
    - fader_3
    - fader_4
    - fader_5
    - fader_6
    - fader_7
    - fader_8
  binding:
    default: >
      NONE
    volume: >
      RING(${me.index}) / VOL
    pan: >
      RING(${me.index}) PAN
    send: >
      SEL / SEND ${send_num({$me.index})
    device: >
      SEL / DEV(SEL) B1 P${me.Index}

fader_9:
  binding: MST / VOL
