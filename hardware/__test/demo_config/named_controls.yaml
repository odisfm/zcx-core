__scene_buttons:
  includes: [scene_1, scene_2, scene_3, scene_4, scene_5, scene_6, scene_7, scene_8]
  color: cyan shade ${me.index % 4}
  gestures:
    press: SCENE ${ring.scenes[me.Index]}
    press__shift: SCENE ${ring.scenes[me.Index + me.group_count]}
    press__select: SCENE SEL ${ring.scenes[me.Index]}
    press__shift__select: SCENE SEL ${ring.scenes[me.Index + me.group_count]}

__dpad:
  includes: [dpad_left, dpad_right, dpad_up, dpad_down]
  color: 127
  repeat: true
  controls:
    dpad_left:
      gestures:
        press: LEFT
        press__shift:
          ring:
            x: -1
    dpad_right:
      gestures:
        press: RIGHT
        press__shift:
          ring:
            x: 1
    dpad_up:
      gestures:
        press: UP
        press__shift:
          ring:
            y: -1
    dpad_down:
      gestures:
        press: DOWN
        press__shift:
          ring:
            y: 1

