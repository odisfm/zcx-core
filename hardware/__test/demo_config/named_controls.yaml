device:
  type: mode
  mode: device
  active_color: 127
  inactive_color: 20
  gestures:
    press:
      mode_on: device
    long_release:
      mode_off: device

mix:
  type: mode
  mode: device
  active_color: 20
  inactive_color: 127
  gestures:
    press:
      mode_off: device

page_prev:
  repeat: true
  gestures:
    press:
      ring:
        x: -${ring.width}
    press__shift:
      ring: left

page_next:
  repeat: true
  gestures:
    press:
      ring:
        x: ${ring.width}
    press__shift:
      ring: right

octave_up:
  repeat: true
  gestures:
    press:
      ring:
        y: -${ring.height}
    press__shift:
      ring: up

octave_down:
  repeat: true
  gestures:
    press:
      ring:
        y: ${ring.height}
    press__shift:
      ring: down

metronome:
  type: transport
  transport: metronome
  gestures:
    press: metro

delete:
  type: mode
  mode: delete
  gestures:
    press:
      mode_on: delete
    release:
      mode_off: delete

undo:
  gestures:
    press: undo
    press__shift: redo

mute:
  type: param
  binding: SEL / MUTE
  on_color: amber
  off_color: white

solo:
  type: param
  binding: SEL / SOLO
  on_color: blue
  off_color: white

stop_clip:
  type: param
  binding: SEL / STOP
  on_color: white
  off_color: grey

new:
  gestures:
    pressed: ADDSCENE

duplicate:
  gestures:
    press: SCENE DUPE

master:
  type: param
  binding: MST / SEL
  on_color: 127
  off_color: 20

user:
  gestures:
    press:
      hardware_mode: live

tap_tempo:
  gestures:
    press: TAPBPM

note:
  gestures:
    press: SHOWCLIP

session:
  gestures:
    press: SHOWDEV

