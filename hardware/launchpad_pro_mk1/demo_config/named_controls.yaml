nav_up:
  gestures:
    pressed: UP
    pressed__shift:
      ring:
        y: -8

nav_down:
  gestures:
    pressed: DOWN
    pressed__shift:
      ring:
        y: 8

nav_left:
  gestures:
    pressed: LEFT
    pressed__shift:
      ring:
        x: -8

nav_right:
  gestures:
    pressed: RIGHT
    pressed__shift:
      ring:
        x: 8

shift:
  gestures:
    pressed:
      mode_on: shift
    released:
      mode_off: shift

record:
  type: transport
  transport: session_record
  gestures:
    pressed: SRECFIX 8
    pressed__shift: SRECFIX 16

duplicate:
  gestures:
    pressed: CLIP DUPE
    pressed__shift: SCENE DUPE

quantise:
  gestures:
    pressed: CLIP QNTZ 1/16 80
    pressed__shift: CLIP QNTZ 1/16 100

arm:
  gestures:
    pressed: SEL / ARM
    pressed__shift: UNDO

mute:
  gestures:
    pressed: SEL / MUTE
    pressed__shift: REDO

solo:
  gestures:
    pressed: SEL / SOLO
    pressed__shift: METRO

