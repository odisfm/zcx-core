__page_switcher:
  includes: [
    session, note, device
  ]
  type: page
  page: ${me.index}
  active_color:
    palette: rainbow
  inactive_color: white
  gestures:
    pressed:
      page: ${me.index}
      msg: >
        Page ${me.page}: ${me.page_name}
    released_delayed:
      page: last

