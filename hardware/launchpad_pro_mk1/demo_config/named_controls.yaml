__scene_buttons:
  includes: [scene_1, scene_2, scene_3, scene_4, scene_5, scene_6, scene_7, scene_8]
  gestures:
    pressed: >
      SCENE ${ring.scenes[me.index]}
    pressed__shift: >
      SCENE ${ring.scenes[me.index + 8]}
    
